<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Accomplishments — Srinivasulu IFS</title>
  <meta name="description" content="Key accomplishments across 12 departments — Karnataka Forest Department, KSPCB, AYUSH, Kali Tiger Reserve and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Kannada:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="accomplishments-premium.css" />
  <style>
    /* Career grid */
    .career-grid{
      display:grid; grid-template-columns:repeat(6, 1fr); gap:var(--s-3);
      padding:0;
    }
    @media (max-width: 768px) { .career-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .career-grid { grid-template-columns: repeat(2, 1fr); } }
    .career-node{
      background:var(--paper-2); border:1px solid var(--line); border-radius:var(--r-md);
      overflow:hidden; height:100%; display:flex; flex-direction:column;
      transition:transform var(--d), box-shadow var(--d);
    }
    .career-node:hover{ transform:translateY(-3px); box-shadow:var(--e2); }
    .career-img{ aspect-ratio:4/3; background:var(--paper-2); overflow:hidden; }
    .career-img img{ width:100%; height:100%; object-fit:cover; }
    .career-body{ padding:var(--s-3); display:flex; flex-direction:column; flex:1; text-align: left; }
    .career-period{ font-family:var(--f-mono); font-size:var(--t-12); color:var(--ink-3); margin-bottom:6px; }
    .career-role{ font-family:var(--f-display); font-size:var(--t-13); line-height:1.3; margin-bottom:4px; }
    .career-loc{ font-size:var(--t-12); color:var(--ink-3); margin-top:auto; }


    .page-hero-stat {
      display: flex;
      align-items: baseline;
      gap: var(--s-2);
    }
    .page-hero-stat .num {
      font-size: var(--t-20) !important;
    }
    .page-hero-stat .lbl {
      font-size: var(--t-12) !important;
      margin-top: 0 !important;
    }
    .dept-grid {
      grid-template-columns: repeat(6, 1fr) !important;
      gap: var(--s-3) !important;
    }
    .dept-card {
      padding: var(--s-2) !important;
      min-height: 180px !important;
      justify-content: center !important;
      align-items: center !important;
      text-align: center !important;
    }
    .dept-logo {
      width: 72px !important;
      height: 72px !important;
      margin-bottom: var(--s-2) !important;
      padding: 2px !important;
    }
    .dept-card h3 {
      font-size: var(--t-12) !important;
      margin-bottom: 0 !important;
      font-weight: 500 !important;
      line-height: 1.25 !important;
    }
    .dept-meta {
      display: none !important;
    }
    .dept-arrow {
      display: none !important;
    }
    .dept-card:hover {
      transform: none !important;
    }
    @media (max-width: 1024px) {
      .dept-grid { grid-template-columns: repeat(6, 1fr) !important; }
      .dept-card { min-height: 140px !important; }
      .dept-logo { width: 44px !important; height: 44px !important; }
    }
    @media (max-width: 820px) {
      .dept-grid { grid-template-columns: repeat(4, 1fr) !important; } /* 3 rows on small tablets */
    }
    @media (max-width: 600px) {
      .dept-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 400px) {
      .dept-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>
<div id="sr-chrome-top"></div>

<main id="main" class="acc-v2">

  <section class="page-hero">
    <div class="container reveal">
      <div class="breadcrumb"><a href="index.html">Home</a> <i data-lucide="chevron-right" class="icon-sm"></i> <span>Accomplishments</span></div>
      <div style="display:grid; grid-template-columns:auto 1fr; gap:var(--s-8); align-items:center;">
        <!-- LEFT: title -->
        <h1 style="margin:0 !important; white-space:nowrap;">Accomplishments</h1>
        <!-- RIGHT: divider + meta -->
        <div style="display:flex; flex-direction:column; gap:var(--s-3); border-left:2px solid rgba(255,255,255,.18); padding-left:var(--s-8);">
          <p style="font-family:'DM Sans',system-ui,sans-serif; font-size:clamp(13px,1.1vw,15px); color:rgb(255, 255, 255); margin:0; line-height:1.6;">
            Key milestones and initiatives across 12 departments — Karnataka Forest Department, KSPCB, AYUSH, Kali Tiger Reserve and more.
          </p>
          <div style="display:flex; gap:var(--s-4); flex-wrap:wrap; align-items:center;">
            <div class="search-input" style="flex:1; max-width:360px;display: none;" >
              <i data-lucide="search" class="icon-sm"></i>
              <input id="deptSearch" type="search" placeholder="Search departments…" >
            </div>
            <div class="page-hero-stat"><div class="num">12</div><div class="lbl">Postings on record</div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="filter-bar">
    <div class="container" style="display:flex;gap:var(--s-4);align-items:center;width:100%;flex-wrap:wrap;">
      <div class="filter-chips" id="deptFilter"></div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="career-grid" id="deptGrid"></div>
    </div>
  </section>

</main>

<div id="sr-chrome-footer"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="chrome.js"></script>
<script src="app.js"></script>
<script>
window.addEventListener('load', () => {
  const data = window.SR_DEPTS_CV || [];
  const logos = window.SR_LOGOS || {};
  const grid = document.getElementById('deptGrid');

  let deptFilter = 'all';
  let searchQ = '';
  function render(){
    let list = deptFilter === 'all' ? data : data.filter(d => d.slug === deptFilter);
    if (searchQ) list = list.filter(d => d.name.toLowerCase().includes(searchQ) || (d.kind||'').toLowerCase().includes(searchQ));
    if (!list.length){
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i data-lucide="search-x"></i><p>No departments match that search.</p></div>';
      window.SrIcons && window.SrIcons();
      return;
    }
    grid.innerHTML = list.map(d => `
        <a href="dept.html?dept=${d.slug}&page=accomplishments" class="career-node" style="text-decoration:none;color:inherit;">
          <div class="career-img"><img src="${logos[d.slug] || ''}" alt="${d.name}" loading="lazy" style="object-fit:contain;padding:12px;background:var(--paper-2);"></div>
          <div class="career-body">
            <div class="career-period" style="display:none;">${d.period || ''}</div>
            <div class="career-role">${d.name}</div>
            <div class="career-loc">${d.kind || ''}</div>
          </div>
        </a>
    `).join('');
    window.SrIcons && window.SrIcons();
  }

  /* ── Department filter chips ── */
  (function(){
    const container = document.getElementById('deptFilter');
    if (!container) return;
    const first5 = data.slice(0, 5);
    const rest   = data.slice(5);
    container.innerHTML = '<button class="chip is-active" data-filter="all">All Depts</button>'
      + first5.map(d => `<button class="chip" data-filter="${d.slug}">${d.name}</button>`).join('')
      + rest.map(d => `<button class="chip is-hidden" data-filter="${d.slug}" style="display:none;">${d.name}</button>`).join('')
      + (rest.length ? '<button class="chip view-more-btn" id="viewMoreDepts">View more...</button>' : '');

    const chips    = container.querySelectorAll('.chip:not(.view-more-btn)');
    const viewMore = document.getElementById('viewMoreDepts');
    if (viewMore){
      viewMore.addEventListener('click', () => {
        const hidden = container.querySelectorAll('.is-hidden');
        if (hidden.length){
          hidden.forEach(el => { el.style.display = 'inline-flex'; el.classList.remove('is-hidden'); });
          viewMore.textContent = 'View less';
        } else {
          Array.from(chips).slice(6).forEach(el => { el.style.display = 'none'; el.classList.add('is-hidden'); });
          viewMore.textContent = 'View more...';
        }
      });
    }
    chips.forEach(c => c.addEventListener('click', () => {
      chips.forEach(x => x.classList.remove('is-active'));
      c.classList.add('is-active');
      deptFilter = c.dataset.filter;
      render();
    }));
  })();

  const searchEl = document.getElementById('deptSearch');
  if (searchEl) searchEl.addEventListener('input', e => { searchQ = e.target.value.toLowerCase().trim(); render(); });
  render();

});
</script>
</body>
</html>
