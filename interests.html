<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Interests — Srinivasulu IFS</title>
  <meta name="description" content="Personal interests — wildlife and bird photography by Srinivasulu IFS.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Kannada:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="photos-premium.css" />
  <style>
    .pho-v2 .page-hero{ background:#0e2e1f !important; }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>
<div id="sr-chrome-top"></div>

<main id="main" class="pho-v2">

  <section class="page-hero">
    <div class="container reveal">
      <div class="breadcrumb"><a href="index.html">Home</a> <i data-lucide="chevron-right" class="icon-sm"></i> <span>Interests</span></div>
      <div style="display:grid; grid-template-columns:auto 1fr; gap:clamp(24px,4vw,56px); align-items:center;">
        <h1>Interests</h1>
        <div style="display:flex; flex-direction:column; gap:var(--s-5); border-left:2px solid rgba(201,168,76,.4); padding-left:clamp(20px,3vw,44px);">
          <p class="lede">Beyond forest governance — a lifelong passion for wildlife and bird photography, carried into the field on every posting.</p>
          <div class="page-hero-stats">
            <div class="page-hero-stat"><div class="num" id="iCount">—</div><div class="lbl">Photographs</div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="masonry" id="interestGrid"></div>
    </div>
  </section>

</main>

<div id="sr-chrome-footer"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="chrome.js"></script>
<script src="app.js"></script>
<script>
const PHOTOS = Array.from({ length: 25 }, (_, i) => {
  const n = String(i + 1).padStart(2, '0');
  return { src: `images/interests/bird-${n}.jpg`, alt: 'Bird photography' };
});

document.getElementById('iCount').textContent = PHOTOS.length;

document.getElementById('interestGrid').innerHTML = PHOTOS.map((p, i) => `
  <button class="photo-tile" data-i="${i}" aria-label="Open photo">
    <img src="${p.src}" alt="${p.alt}" loading="lazy">
  </button>
`).join('');

window.SrIcons && window.SrIcons();

document.querySelectorAll('#interestGrid .photo-tile').forEach(t => {
  t.addEventListener('click', () => {
    const items = PHOTOS.map(p => ({ src: p.src, alt: p.alt, category: 'Interests' }));
    PhotoViewer.open(items, parseInt(t.dataset.i, 10));
  });
});
</script>
</body>
</html>
