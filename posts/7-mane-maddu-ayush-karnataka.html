<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!--

    <title id="page-title">Hennina Arogya Samrakshane</title>
    <meta name="description" id="meta-desc" content="" />
    <meta property="og:title" id="og-title" content="" />
    <meta property="og:image" id="og-image" content="" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../design-system.css" />

    <style>
      /* ── TOKENS ─────────────────────────────────────────────────── */
      :root {
        --v-ivory: #f7f3ec;
        --v-ivory-dark: #ede8df;
        --v-paper: #fffdf8;
        --v-gold: #c9a84c;
        --v-gold-light: #e8cc7a;
        --v-emerald: #0e2e1f;
        --v-emerald-mid: #1d5c3a;
        --v-emerald-accent: #2e9460;
        --v-emerald-pale: #e0f0e8;
        --v-ink: #13201a;
        --v-ink-soft: #5a655d;
      }

      /* ── BASE ────────────────────────────────────────────────────── */
      .post-page {
        background: var(--v-ivory);
        color: var(--v-ink);
      }
      .post-page h1,
      .post-page h2,
      .post-page h3 {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--v-emerald);
        font-weight: 600;
        letter-spacing: normal;
      }
      .post-page p,
      .post-page li,
      .post-page span,
      .post-page a,
      .post-page time,
      .post-page button {
        font-family: "DM Sans", system-ui, sans-serif;
      }

      /* ── HERO ────────────────────────────────────────────────────── */
      .post-hero {
        position: relative;
        padding: clamp(40px, 5vw, 72px) 0 clamp(24px, 3vw, 40px);
        background:
          radial-gradient(
            70% 80% at 100% 0%,
            rgba(46, 148, 96, 0.12),
            transparent 55%
          ),
          var(--v-ivory);
        border-bottom: 1px solid rgba(14, 46, 31, 0.08);
      }
      .post-bc {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(14, 46, 31, 0.08);
        font-size: 13px;
        color: var(--v-ink-soft);
        margin-bottom: var(--s-5, 20px);
        backdrop-filter: blur(6px);
      }
      .post-bc a {
        color: var(--v-emerald-accent);
        text-decoration: none;
      }
      .post-bc a:hover {
        color: var(--v-emerald);
      }
      .post-bc svg {
        width: 14px;
        height: 14px;
      }
      .post-tag-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: var(--s-4, 16px);
      }
      .post-tag {
        display: inline-flex;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: var(--v-emerald-pale);
        color: var(--v-emerald-mid);
      }
      .post-tag.tag-kn {
        background: rgba(201, 168, 76, 0.15);
        color: #7a5a10;
      }
      .post-title {
        font-size: clamp(30px, 4.5vw, 60px);
        line-height: 1.1;
        margin-bottom: var(--s-4, 16px);
        max-width: 50ch;
      }
      .post-lede {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(18px, 1.6vw, 22px);
        line-height: 1.55;
        color: var(--v-ink-soft);
        font-style: italic;
        max-width: 62ch;
        margin-bottom: var(--s-5, 20px);
      }
      .post-meta {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        align-items: center;
        font-size: 13px;
        color: var(--v-ink-soft);
      }
      .post-meta > span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .post-meta svg {
        width: 14px;
        height: 14px;
      }
      .post-meta .author {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding-left: 12px;
        border-left: 1px solid rgba(14, 46, 31, 0.15);
        margin-left: 6px;
      }
      .post-meta .author-fallback {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--v-emerald),
          var(--v-emerald-mid)
        );
        color: var(--v-gold-light);
        display: grid;
        place-items: center;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 600;
        font-size: 14px;
      }
      .post-meta .lang-flag {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 4px;
        background: rgba(14, 46, 31, 0.08);
        color: var(--v-emerald-mid);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
      }

      /* ── COVER IMAGE ─────────────────────────────────────────────── */
      .post-cover {
        padding: clamp(16px, 2.5vw, 32px) 0;
        background: var(--v-ivory);
      }
      .post-cover .container {
        max-width: 780px;
      }
      .post-cover img {
        width: 100%;
        max-height: 640px;
        object-fit: contain;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 20px 52px rgba(14, 46, 31, 0.2);
        border: 1px solid rgba(14, 46, 31, 0.08);
        display: block;
        cursor: zoom-in;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .post-cover img:hover {
        transform: scale(1.012);
        box-shadow: 0 28px 64px rgba(14, 46, 31, 0.26);
      }

      /* ── STICKY STRIP ────────────────────────────────────────────── */
      .post-meta-strip {
        position: sticky;
        top: var(--nav-h, 64px);
        z-index: 30;
        background: rgba(247, 243, 236, 0.94);
        border-top: 1px solid rgba(14, 46, 31, 0.08);
        border-bottom: 1px solid rgba(14, 46, 31, 0.08);
        padding: 10px 0;
        backdrop-filter: blur(10px);
      }
      .post-meta-strip .container {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 13px;
        color: var(--v-ink-soft);
        flex-wrap: wrap;
      }
      .post-meta-strip a {
        color: var(--v-emerald-accent);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
      }
      .post-meta-strip a:hover {
        color: var(--v-emerald);
      }
      .post-meta-strip a svg,
      .post-meta-strip .strip-btn svg {
        width: 14px;
        height: 14px;
      }
      .post-meta-strip .sticky-title {
        color: var(--v-emerald);
        font-weight: 600;
        max-width: 30ch;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .post-meta-strip .actions {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }
      .strip-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid rgba(14, 46, 31, 0.18);
        color: var(--v-emerald);
        font-size: 12.5px;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
      }
      .strip-btn:hover {
        background: var(--v-emerald);
        color: var(--v-ivory);
        border-color: var(--v-emerald);
      }

      /* ── BODY ────────────────────────────────────────────────────── */
      .post-body {
        padding: clamp(32px, 5vw, 72px) 0;
        background: var(--v-ivory);
      }
      .post-body-inner {
        max-width: 720px;
        margin: 0 auto;
      }
      .post-body p {
        font-size: 17px;
        line-height: 1.85;
        color: var(--v-ink);
        margin-bottom: var(--s-5, 20px);
      }
      .post-body p:first-of-type::first-letter {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 600;
        color: var(--v-emerald);
        font-size: 60px;
        line-height: 0.9;
        float: left;
        padding: 6px 12px 0 0;
      }
      .post-body h2 {
        font-size: clamp(24px, 2.8vw, 34px);
        margin: var(--s-8, 40px) 0 var(--s-4, 16px);
        position: relative;
        padding-bottom: 14px;
      }
      .post-body h2::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 42px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          var(--v-gold),
          var(--v-emerald-accent)
        );
      }
      .post-body ul,
      .post-body ol {
        margin: var(--s-4, 16px) 0 var(--s-5, 20px);
        padding-left: var(--s-6, 24px);
      }
      .post-body li {
        font-size: 17px;
        line-height: 1.7;
        margin-bottom: 8px;
      }
      .post-body strong {
        font-weight: 600;
        color: var(--v-emerald);
      }
      .post-body a {
        color: var(--v-emerald-accent);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      /* journal meta grid */
      .journal-meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin: var(--s-5, 20px) 0;
        padding: 20px;
        background: var(--v-paper);
        border: 1px solid rgba(14, 46, 31, 0.1);
        border-radius: 12px;
      }
      .jm-item .jm-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--v-emerald-accent);
        margin-bottom: 4px;
      }
      .jm-item .jm-value {
        font-size: 14px;
        font-weight: 500;
        color: var(--v-ink);
      }

      /* source note */
      .source-note {
        margin: var(--s-6, 24px) 0 var(--s-3, 12px);
        padding: 16px 20px;
        background: var(--v-paper);
        border: 1px solid rgba(14, 46, 31, 0.1);
        border-left: 4px solid var(--v-emerald-accent);
        border-radius: 0 10px 10px 0;
        font-size: 14px;
        color: var(--v-ink-soft);
        line-height: 1.6;
      }

      /* PDF download link */
      .post-file {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        background: var(--v-paper);
        border: 1px solid rgba(14, 46, 31, 0.1);
        border-radius: 10px;
        color: var(--v-emerald);
        font-size: 14px;
        margin: var(--s-3, 12px) 0;
        text-decoration: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .post-file:hover {
        border-color: var(--v-gold);
        box-shadow: 0 4px 12px rgba(201, 168, 76, 0.18);
      }

      /* ── PDF VIEWER (inline, 100+ page docs) ─────────────────────── */
      .pdf-viewer-section {
        background: var(--v-ivory-dark);
        border-top: 1px solid rgba(14, 46, 31, 0.08);
        border-bottom: 1px solid rgba(14, 46, 31, 0.08);
        padding: 0;
      }
      .pdf-viewer-header {
        max-width: 900px;
        margin: 0 auto;
        padding: 16px 20px 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .pdf-viewer-header h3 {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--v-emerald);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin: 0;
      }
      .pdf-viewer-header .pv-actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }
      .pv-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 999px;
        background: var(--v-emerald);
        color: var(--v-ivory);
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .pv-btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }
      .pv-btn.outline {
        background: transparent;
        color: var(--v-emerald);
        border: 1px solid rgba(14, 46, 31, 0.25);
      }
      .pv-btn.outline:hover {
        background: var(--v-emerald);
        color: var(--v-ivory);
      }
      .pdf-frame-wrap {
        max-width: 900px;
        margin: 0 auto;
      }
      .pdf-frame-wrap iframe {
        display: block;
        width: 100%;
        height: clamp(560px, 78vh, 960px);
        border: none;
        background: #fff;
      }

      /* ── SHARE ───────────────────────────────────────────────────── */
      .post-share-wrap {
        background: var(--v-ivory);
        padding: 0 0 var(--s-8, 40px);
      }
      .post-share-wrap .container {
        max-width: 720px;
      }
      .post-share {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: var(--s-5, 20px) 0;
        border-top: 1px solid rgba(14, 46, 31, 0.12);
        border-bottom: 1px solid rgba(14, 46, 31, 0.12);
      }
      .share-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid rgba(14, 46, 31, 0.18);
        color: var(--v-emerald);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s,
          transform 0.15s;
      }
      .share-btn:hover {
        background: var(--v-emerald);
        color: var(--v-ivory);
        border-color: var(--v-emerald);
      }
      .share-btn.is-primary {
        background: var(--v-gold);
        color: var(--v-emerald);
        border-color: var(--v-gold);
        margin-left: auto;
      }
      .share-btn.is-primary:hover {
        background: var(--v-gold-light);
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(201, 168, 76, 0.32);
      }
      .share-btn svg {
        width: 14px;
        height: 14px;
      }
      .share-btn.is-copied {
        background: var(--v-emerald-mid);
        color: var(--v-ivory);
        border-color: var(--v-emerald-mid);
      }

      /* ── RELATED POSTS ───────────────────────────────────────────── */
      .related {
        padding: clamp(48px, 6vw, 80px) 0;
        background: var(--v-ivory-dark);
        border-top: 1px solid rgba(14, 46, 31, 0.08);
      }
      .related-head {
        margin-bottom: var(--s-6, 24px);
      }
      .related-eyebrow {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.16em;
        color: var(--v-emerald-accent);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .related h2 {
        font-size: clamp(28px, 3.2vw, 40px);
        margin: 0;
      }
      .related-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--s-4, 16px);
      }
      .related-card {
        background: var(--v-paper);
        border: 1px solid rgba(14, 46, 31, 0.1);
        border-radius: 12px;
        overflow: hidden;
        transition:
          transform 0.25s,
          box-shadow 0.25s,
          border-color 0.25s;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
      }
      .related-card:hover {
        transform: translateY(-3px);
        border-color: var(--v-gold);
        box-shadow: 0 14px 28px rgba(14, 46, 31, 0.1);
      }
      .related-card-img {
        aspect-ratio: 16/10;
        overflow: hidden;
        background: var(--v-ivory-dark);
      }
      .related-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .related-card-body {
        padding: var(--s-4, 16px);
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .related-tag {
        display: inline-block;
        padding: 3px 9px;
        background: var(--v-emerald-pale);
        color: var(--v-emerald-mid);
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 10px;
        align-self: flex-start;
      }
      .related-title {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 18px;
        line-height: 1.3;
        color: var(--v-emerald);
        margin-bottom: 8px;
      }
      .related-excerpt {
        font-size: 13px;
        color: var(--v-ink-soft);
        line-height: 1.5;
        margin-bottom: auto;
      }
      .related-foot {
        display: flex;
        justify-content: space-between;
        padding-top: var(--s-3, 12px);
        margin-top: var(--s-3, 12px);
        border-top: 1px solid rgba(14, 46, 31, 0.08);
        font-size: 12px;
        color: var(--v-ink-soft);
      }
      .related-read {
        color: var(--v-emerald-accent);
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      /* ── FOOT ────────────────────────────────────────────────────── */
      .post-foot {
        padding: clamp(32px, 4vw, 48px) 0;
        background: var(--v-ivory-dark);
        border-top: 1px solid rgba(14, 46, 31, 0.08);
      }
      .post-foot-card {
        max-width: 720px;
        margin: 0 auto;
        padding: clamp(20px, 2.5vw, 32px);
        background: var(--v-paper);
        border: 1px solid rgba(14, 46, 31, 0.1);
        border-top: 3px solid var(--v-gold);
        border-radius: 14px;
        box-shadow: 0 14px 28px rgba(14, 46, 31, 0.08);
        display: flex;
        align-items: center;
        gap: var(--s-5, 20px);
        flex-wrap: wrap;
      }
      .post-foot-card .label {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--v-emerald-accent);
        margin-bottom: 6px;
      }
      .post-foot-card h3 {
        font-size: 22px;
        line-height: 1.2;
      }
      .post-foot-card .btns {
        margin-left: auto;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .post-foot-card .btn-primary {
        background: var(--v-gold);
        color: var(--v-emerald);
        border: 1px solid var(--v-gold);
      }
      .post-foot-card .btn-primary:hover {
        background: var(--v-gold-light);
        transform: translateY(-2px);
        box-shadow: 0 10px 26px rgba(201, 168, 76, 0.32);
      }
      .post-foot-card .btn-outline {
        border: 1.5px solid var(--v-emerald);
        color: var(--v-emerald);
      }
      .post-foot-card .btn-outline:hover {
        background: var(--v-emerald);
        color: var(--v-ivory);
      }

      /* ── PRINT ───────────────────────────────────────────────────── */
      @media print {
        .post-meta-strip,
        .post-share-wrap,
        .related,
        .post-foot,
        .pdf-viewer-section,
        #sr-chrome-top,
        #sr-chrome-footer,
        .skip-link {
          display: none !important;
        }
        body {
          background: #fff;
          color: #000;
        }
        .post-hero {
          padding: 8pt 0;
          background: #fff;
        }
        .post-cover img {
          max-height: 60vh;
        }
        .post-body {
          padding: 8pt 0;
        }
      }

      /* ── RESPONSIVE ──────────────────────────────────────────────── */
      .post-page,
      html,
      body {
        overflow-x: hidden;
      }
      @media (max-width: 980px) {
        .related-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 768px) {
        .post-hero {
          padding: 32px 0 22px;
        }
        .post-title {
          font-size: clamp(26px, 5.5vw, 40px);
        }
        .post-lede {
          font-size: 17px;
        }
        .post-cover img {
          max-height: 480px;
          border-radius: 10px;
        }
        .post-body {
          padding: 36px 0;
        }
        .post-body p,
        .post-body li {
          font-size: 16px;
        }
        .post-foot-card .btns {
          margin-left: 0;
          width: 100%;
        }
      }
      @media (max-width: 640px) {
        .related-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 600px) {
        .post-page .container {
          padding-left: 18px;
          padding-right: 18px;
        }

    <script>
      /* ═══════════════════════════════════════════════════════════════
        ▼▼▼  EDIT ONLY THIS OBJECT FOR EACH PAGE  ▼▼▼
        ═══════════════════════════════════════════════════════════════ */
      const POST_DATA = {
        slug: "7-mane-maddu-ayush-karnataka",
        title: "Mane Maddu — ಮನೆ ಮದ್ದು (Home Remedies)",
        titleFull: "Mane Maddu — ಮನೆ ಮದ್ದು (Home Remedies)",
        lede: "Mane Maddu — ಮನೆ ಮದ್ದು — A comprehensive Kannada guide to traditional home remedies — Ayurvedic treatments using everyday household ingredients for common ailments. Published by Karnataka Department of Ayush, August 2024.",
        date: "26 August 20",
        dateISO: "2024-08-26",
        minsRead: "5",
        lang: "KN",
        langLabel: "ಕನ್ನಡ",
        category: "Ayush",

        /* Path to the cover image you export from the PDF first page */
        coverImg: "../assets/pdf-covers/7_Mane_Maddu_cover.jpg",
        coverAlt: "Mane Maddu — ಮನೆ ಮದ್ದು cover page",

        /* Path to the renamed PDF in assets/pdf/ */
        pdfUrl: "/assets/pdf/7_Mane_Maddu_26.8.2024.pdf",
        pdfLabel: "7_Mane_Maddu_26.8.2024.pdf",

        /* Journal metadata shown as a grid */
        meta: [
          { label: "Publication No.", value: "7" },
          { label: "Subject", value: "ಮನೆ ಮದ್ದು — Mane Maddu" },
          { label: "Language", value: "Kannada" },
          { label: "Published", value: "August 2024" },
          { label: "Publisher", value: "Dept. of Ayush, Govt. of Karnataka" },
          { label: "Pages", value: "100+" },
        ],

        /* Body paragraphs — add as many as you like */
        body: `
    <h2>Why Traditional Medicine Matters</h2>
    <p>Karnataka has a rich tradition of <em>Grama Vaidya</em> — village-level healthcare using locally sourced plants and preparations. This publication systematically documents and validates these practices, bridging folk knowledge with the formal Ayurvedic canon.</p>
  `,

        /* Source note at the end of body */
        source:
          "Published by the Department of Ayush, Government of Karnataka, August 2012. Part of the Ayush4U publication series.",
      };
      /* ▲▲▲  END OF EDITABLE SECTION  ▲▲▲ */

      /* ═══════════════════════════════════════════════════════════════
   ENGINE — do not edit below
   ═══════════════════════════════════════════════════════════════ */
      (function () {
        const D = POST_DATA;

        /* ── inject meta ── */
        document.getElementById("meta-desc").content = D.lede;
        document.getElementById("og-title").content = D.titleFull;
        document.getElementById("og-image").content = D.coverImg;
        document.body.dataset.slug = D.slug;
        document.body.dataset.category = D.category;

        /* ── hero ── */
        document.getElementById("hero-title").textContent = D.title;
        document.getElementById("hero-lede").textContent = D.lede;
        document.getElementById("hero-date").textContent = D.date;
        document.getElementById("hero-date").dateTime = D.dateISO;
        document.getElementById("hero-read").textContent =
          D.minsRead + " min read";
        document.getElementById("hero-lang").textContent = D.lang;
        document.getElementById("hero-lang-tag").textContent = D.langLabel;

        /* ── cover image ── */
        const coverImg = document.getElementById("cover-img");
        coverImg.src = D.coverImg;
        coverImg.alt = D.coverAlt;
        coverImg.addEventListener("click", () => togglePdf());

        /* ── body ── */
        const metaHtml = D.meta
          .map(
            (m) =>
              `<div class="jm-item"><div class="jm-label">${m.label}</div><div class="jm-value">${m.value}</div></div>`,
          )
          .join("");

        document.getElementById("post-body-content").innerHTML =
          D.body +
          `<div class="journal-meta">${metaHtml}</div>` +
          `<div class="source-note">${D.source}</div>` +
          `<a class="post-file" href="${D.pdfUrl}" target="_blank" rel="noopener">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;flex-shrink:0">
         <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
         <polyline points="14 2 14 8 20 8"/>
         <line x1="16" y1="13" x2="8" y2="13"/>
         <line x1="16" y1="17" x2="8" y2="17"/>
       </svg>
       <span>${D.pdfLabel} <em style="color:var(--v-ink-soft);font-style:normal;">(Full publication PDF)</em></span>
     </a>`;

        /* ── PDF viewer toggle ── */
        const pdfSection = document.getElementById("pdf-viewer-section");
        const pdfIframe = document.getElementById("pdf-iframe");
        const pvDownload = document.getElementById("pv-download");
        const openPdfBtn = document.getElementById("openPdfBtn");
        const closePdfBtn = document.getElementById("pv-close");

        if (pvDownload) {
          pvDownload.href = D.pdfUrl;
          pvDownload.download = D.pdfLabel;
        }

        let pdfLoaded = false;

        function togglePdf(forceOpen) {
          if (!pdfSection) {
            console.error("pdf-viewer-section not found");
            return;
          }

          const isHidden = getComputedStyle(pdfSection).display === "none";

          const open = forceOpen !== undefined ? forceOpen : isHidden;

          if (open) {
            pdfSection.style.display = "block";

            if (pdfIframe && !pdfLoaded) {
              pdfIframe.src = D.pdfUrl;
              pdfLoaded = true;
            }

            setTimeout(() => {
              pdfSection.scrollIntoView({
                behavior: "smooth",
                block: "start",
              });
            }, 80);

            if (openPdfBtn) {
              openPdfBtn.innerHTML = `
            <svg viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="width:13px;height:13px;">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
            <span>Close PDF</span>
        `;
            }
          } else {
            pdfSection.style.display = "none";

            if (openPdfBtn) {
              openPdfBtn.innerHTML = `
            <svg viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="width:13px;height:13px;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <span>Read PDF</span>
        `;
            }
          }
        }

        /* Open button */
        if (openPdfBtn) {
          openPdfBtn.addEventListener("click", () => {
            console.log("Open PDF clicked");
            togglePdf();
          });
        }

        /* Close button */
        if (closePdfBtn) {
          closePdfBtn.addEventListener("click", (e) => {
            e.preventDefault();
            console.log("Close PDF clicked");
            togglePdf(false);
          });
        } else {
          console.error("pv-close button not found");
        }

        /* ── download ── */
        function triggerDownload() {
            const a = document.createElement("a");
            a.href = D.pdfUrl;
            a.download = D.pdfLabel;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        const downloadBtn = document.getElementById("downloadBtn");
        if (downloadBtn) {
        downloadBtn.addEventListener("click", triggerDownload);
        }

        const downloadBtnBottom = document.getElementById("downloadBtnBottom");
        if (downloadBtnBottom) {
        downloadBtnBottom.addEventListener("click", triggerDownload);
        }

        /* ── share ── */
        document.querySelectorAll("[data-share]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const url = encodeURIComponent(location.href);
            const ttl = encodeURIComponent(document.title);
            const kind = btn.dataset.share;
            let target = "";
            if (kind === "wa")
              target = "https://wa.me/?text=" + ttl + "%20" + url;
            else if (kind === "x")
              target =
                "https://twitter.com/intent/tweet?text=" + ttl + "&url=" + url;
            else if (kind === "fb")
              target = "https://www.facebook.com/sharer/sharer.php?u=" + url;
            else if (kind === "li")
              target =
                "https://www.linkedin.com/sharing/share-offsite/?url=" + url;
            else if (kind === "copy") {
              const orig = btn.innerHTML;
              navigator.clipboard
                .writeText(location.href)
                .then(() => {
                  btn.classList.add("is-copied");
                  btn.innerHTML =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied';
                  setTimeout(() => {
                    btn.classList.remove("is-copied");
                    btn.innerHTML = orig;
                  }, 1500);
                })
                .catch(() => {});
              return;
            }
            if (target)
              window.open(target, "_blank", "noopener,width=600,height=600");
          });
        });

        /* ── related posts ── */
        const grid = document.getElementById("relatedGrid");
        if (grid) {
          fetch("../assets/posts-full.json")
            .then((r) => r.json())
            .then((all) => {
              if (!Array.isArray(all)) return;
              const SLUG = D.slug;
              const CAT = D.category;
              let pool = all.filter((p) => p && p.slug && p.slug !== SLUG);
              let related = pool.filter((p) =>
                (p.categories || []).includes(CAT),
              );
              if (related.length < 3) {
                const others = pool
                  .filter((p) => !related.includes(p))
                  .sort(() => Math.random() - 0.5);
                related = related.concat(others).slice(0, 3);
              } else {
                related = related.sort(() => Math.random() - 0.5).slice(0, 3);
              }
              const fb =
                "https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=600&q=80";
              grid.innerHTML = related
                .map((p) => {
                  const slug = (p.slug || "").replace(/"/g, "");
                  const img = p.image || fb;
                  console.log("Hello", p);
                  const cat = (p.categories && p.categories[0]) || "";
                  const title = (p.title || "")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
                  const exc = (p.excerpt || "")
                    .slice(0, 110)
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
                  const date = p.date
                    ? new Date(p.date).toLocaleDateString("en-IN", {
                        day: "numeric",
                        month: "short",
                        year: "numeric",
                      })
                    : "";
                  return `<a class="related-card" href="${slug}.html">
          <div class="related-card-img"><img src="${img}" alt="" loading="lazy" onerror="this.src='${fb}'"></div>
          <div class="related-card-body">
            ${cat ? `<span class="related-tag">${cat}</span>` : ""}
            <h3 class="related-title">${title}</h3>
            ${exc ? `<p class="related-excerpt">${exc}…</p>` : ""}
            <div class="related-foot"><span>${date}</span><span class="related-read">Read →</span></div>
          </div></a>`;
                })
                .join("");
            })
            .catch((e) => console.warn("related posts", e));
        }
      })();
    </script>
